name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pipeline-accuracy:
    name: Pipeline accuracy gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System OCR dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq tesseract-ocr
      - name: Install pipeline
        run: pip install -e ./pipeline
      - name: Process fixture records
        run: python -m casepipe.run --input fixtures/records --out /tmp/pipeout
      - name: Score against ground truth (gates the build)
        run: >
          python -m casepipe.score --findings /tmp/pipeout
          --truth fixtures/records/ground_truth.json
          --min-recall 0.9 --min-precision 0.95

  web-build:
    name: Next.js build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
